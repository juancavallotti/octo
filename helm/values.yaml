# Default values for the octo chart. The k3s Terraform renders an override
# values.yaml on the VM (image registry/tag, domain, postgres password); these
# defaults keep `helm template`/`helm lint` working and document every knob.

nameOverride: ""
fullnameOverride: ""

# Shared image coordinates. registry is the Artifact Registry base
# (e.g. us-central1-docker.pkg.dev/PROJECT/octo); leave empty to use bare local
# :dev image names. Per-component repository names are appended to it.
image:
  registry: ""
  tag: dev
  pullPolicy: IfNotPresent

platform:
  repository: octo-platform
  replicas: 1
  service:
    port: 3000

orchestrator:
  repository: octo-orchestrator
  replicas: 1
  service:
    port: 8090
  # Stage 2 (per-integration external endpoints). When baseDomain is set the
  # orchestrator creates a Traefik Ingress per externally-exposed deployment at
  # {subdomain}.{baseDomain}, issuing TLS via clusterIssuer. Empty = internal only.
  baseDomain: ""
  clusterIssuer: ""

# Generic runtime image the orchestrator deploys per integration. Passed to the
# orchestrator as RUNTIME_IMAGE; pre-pulled into containerd at provision so
# integration pods (imagePullPolicy IfNotPresent) never hit the registry later.
runtime:
  repository: octo-runtime
  # Runtime-services backend the orchestrator injects into each deployed runtime
  # pod (RUNTIME_SERVICES_MODULE). "k8s" = Lease-based leader election (so a cron
  # connector fires on one replica) + the orchestrator-backed KV store; "standalone"
  # = in-process noop. Cluster deploys want "k8s".
  servicesModule: k8s

# Schema applier image (built from sql/Dockerfile); run as a post-install/upgrade
# hook job to apply sql/schema.sql idempotently.
schema:
  repository: octo-schema

postgres:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: octo
    password: octo
    database: octo
  storage:
    size: 5Gi
    # Empty -> cluster default StorageClass (k3s ships local-path).
    storageClassName: ""
  service:
    port: 5432
  resources: {}

# OIDC single sign-on for the editor (Auth.js). Disabled by default so local and
# bare deploys stay open; enable on the platform. When enabled the chart creates
# an auth Secret and the editor mounts these as env vars (AUTH_EETR_*, AUTH_SECRET).
# Terraform supplies the sensitive values from Secret Manager (see deploy/terraform).
auth:
  oidc:
    enabled: false
    issuer: "https://auth.eetr.app"
    clientId: ""
    clientSecret: ""
  # Auth.js session secret (AUTH_SECRET); generated by Terraform.
  secret: ""
  # Optional: restrict write/mutating operations to these comma-separated roles.
  # Empty = any signed-in user.
  writeRoles: ""
  # Optional: id-token claim carrying roles (Auth.js default is "roles").
  rolesClaim: ""

ingress:
  enabled: true
  className: traefik
  host: octo.juancavallotti.com
  annotations: {}
  tls:
    enabled: true
    secretName: octo-tls
    clusterIssuer: letsencrypt-prod

# Shared wildcard TLS cert for the apex host and *.{ingress.host}, issued once by
# cert-manager via DNS-01 (the only ACME method that can mint a wildcard). When
# enabled, the editor ingress and every per-integration ingress reference this one
# secret instead of issuing a per-host cert via HTTP-01 — so per-integration
# subdomains validate without a cert per subdomain. Requires the DNS-01
# ClusterIssuer (provisioned by the VM bootstrap) and DNS admin on the zone.
wildcardTLS:
  enabled: false
  secretName: octo-wildcard-tls
  clusterIssuer: letsencrypt-dns
