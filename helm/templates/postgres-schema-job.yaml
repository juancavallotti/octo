# Applies sql/schema.sql via the octo-schema image. Run as a Helm hook on every
# install/upgrade — the schema is idempotent (IF NOT EXISTS / ON CONFLICT), and
# Jobs are immutable, so the before-hook-creation delete policy replaces the
# previous run instead of failing.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "octo.fullname" . }}-schema
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: schema
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "octo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: schema
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.postgres.serviceName" . }}
                  key: postgres-password
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "octo.postgres.serviceName" . }} -p {{ .Values.postgres.service.port }} -U {{ .Values.postgres.auth.username }} -d {{ .Values.postgres.auth.database }}; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: apply-schema
          image: {{ include "octo.image" (dict "root" $ "repo" .Values.schema.repository) | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.postgres.serviceName" . }}
                  key: postgres-password
          command:
            - sh
            - -c
            - psql -h {{ include "octo.postgres.serviceName" . }} -p {{ .Values.postgres.service.port }} -U {{ .Values.postgres.auth.username }} -d {{ .Values.postgres.auth.database }} -v ON_ERROR_STOP=1 -f /schema/schema.sql
