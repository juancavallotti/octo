apiVersion: v1
kind: Service
metadata:
  name: {{ include "octo.postgres.serviceName" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  # Headless: stable DNS for the StatefulSet's single replica.
  clusterIP: None
  selector:
    {{- include "octo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: 5432
