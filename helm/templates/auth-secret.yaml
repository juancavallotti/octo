{{- if .Values.auth.oidc.enabled }}
{{- /* OIDC SSO credentials for the editor (Auth.js). Created only when SSO is
       enabled; the platform app mounts these as env vars (see platform-deployment.yaml).
       Modeled on postgres-secret.yaml. */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "octo.auth.secretName" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  # Only the genuinely sensitive values; the issuer and client id are non-secret and
  # set as plain env values in the editor deployment.
  oidc-client-secret: {{ .Values.auth.oidc.clientSecret | quote }}
  auth-secret: {{ .Values.auth.secret | quote }}
{{- end }}
