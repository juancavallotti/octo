{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "octo.fullname" . }}-platform
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform
  {{- $ann := .Values.ingress.annotations | default dict }}
  {{- $tls := .Values.ingress.tls | default dict }}
  {{- $wildcard := .Values.wildcardTLS | default dict }}
  {{- $tlsSecret := $tls.secretName }}
  {{- if $wildcard.enabled }}
  {{- /* The wildcard Certificate owns issuance; reference its Secret and drop the
         per-host cert-manager annotation so ingress-shim doesn't issue a second cert. */}}
  {{- $tlsSecret = $wildcard.secretName }}
  {{- else if and $tls.enabled $tls.clusterIssuer }}
  {{- $ann = merge (dict "cert-manager.io/cluster-issuer" $tls.clusterIssuer) $ann }}
  {{- end }}
  {{- if $ann }}
  annotations:
    {{- range $k, $v := $ann }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if $tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ $tlsSecret | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "octo.platform.serviceName" . }}
                port:
                  number: {{ .Values.platform.service.port }}
{{- end }}
