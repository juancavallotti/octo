apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "octo.postgres.serviceName" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  serviceName: {{ include "octo.postgres.serviceName" . }}
  selector:
    matchLabels:
      {{- include "octo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "octo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.postgres.serviceName" . }}
                  key: postgres-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.postgres.serviceName" . }}
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "octo.postgres.serviceName" . }}
                  key: postgres-database
            # Subdir of the mount avoids initdb complaints if the volume root has
            # other entries (e.g. lost+found).
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgres.auth.username }}", "-d", "{{ .Values.postgres.auth.database }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          {{- with .Values.postgres.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
        # Stable labels only — volumeClaimTemplates are immutable, so omit the
        # version-bearing octo.labels here.
        labels:
          {{- include "octo.selectorLabels" . | nindent 10 }}
          app.kubernetes.io/component: postgres
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.postgres.storage.storageClassName }}
        storageClassName: {{ .Values.postgres.storage.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size | quote }}
