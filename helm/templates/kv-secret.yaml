{{- if .Values.kv.encryptionKey }}
{{- /* Encryption key for the deployment-scoped KV store. The orchestrator uses it
       to encrypt values in secret namespaces (*_secrets) at rest; plain namespaces
       are stored as-is. Created only when a key is supplied (Terraform generates it);
       without it, secret-namespace writes are rejected and plain KV still works.
       The value is the base64-encoded 32-byte key, consumed via secretKeyRef in
       orchestrator-deployment.yaml. Modeled on auth-secret.yaml. */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "octo.kv.secretName" . }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
type: Opaque
stringData:
  kv-encryption-key: {{ .Values.kv.encryptionKey | quote }}
{{- end }}
