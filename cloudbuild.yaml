# Cloud Build pipeline: build the four octo images and the OCI Helm chart, push
# everything to Artifact Registry, then (optionally) roll the cluster by applying the
# Terraform release root. Provisioned and triggered by deploy/terraform/infra
# (enable_cloudbuild=true); the trigger supplies _IMAGE_BASE/_REGION, maps _TAG to the
# pushed git tag, and sets _DEPLOY/_INSTANCE/_ZONE/_DOMAIN.
#
# Run manually (build + push only):
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_IMAGE_BASE=REGION-docker.pkg.dev/PROJECT/octo,_REGION=REGION,_TAG=dev
# Add _DEPLOY=true,_DOMAIN=...  to also roll the cluster.

substitutions:
  _IMAGE_BASE: "" # e.g. us-west1-docker.pkg.dev/PROJECT/octo
  _REGION: us-west1 # Artifact Registry docker host region (…-docker.pkg.dev)
  _TAG: latest # image tag; the trigger overrides this with the git tag name
  # Deploy step (off by default; the trigger flips _DEPLOY to "true").
  _DEPLOY: "false"
  _INSTANCE: octo
  _ZONE: us-west1-a
  _DOMAIN: octo.juancavallotti.com

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

# Each image is tagged with both _TAG (the git tag) and 'latest' so the deployment can
# default image_tag to "latest".
steps:
  # Platform build context is the repo root so its Dockerfile reaches runtime/ +
  # the pnpm workspace (apps/platform).
  - id: build-platform
    name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE_BASE}/octo-platform:${_TAG}", "-t", "${_IMAGE_BASE}/octo-platform:latest", "-f", "apps/platform/Dockerfile", "."]
  - id: build-orchestrator
    name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE_BASE}/octo-orchestrator:${_TAG}", "-t", "${_IMAGE_BASE}/octo-orchestrator:latest", "-f", "orchestrator/Dockerfile", "./orchestrator"]
  - id: build-schema
    name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE_BASE}/octo-schema:${_TAG}", "-t", "${_IMAGE_BASE}/octo-schema:latest", "-f", "sql/Dockerfile", "./sql"]
  - id: build-runtime
    name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE_BASE}/octo-runtime:${_TAG}", "-t", "${_IMAGE_BASE}/octo-runtime:latest", "-f", "runtime/Dockerfile", "./runtime"]

  # Push the images explicitly (not via the trailing `images:` block) so they are in
  # the registry *before* the deploy step's octo-pull reads them by tag.
  - id: push-images
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    waitFor: ["build-platform", "build-orchestrator", "build-schema", "build-runtime"]
    args:
      - -c
      - |
        set -e
        for img in octo-platform octo-orchestrator octo-schema octo-runtime; do
          for t in "${_TAG}" latest; do
            docker push "${_IMAGE_BASE}/$img:$t"
          done
        done

  # Package + push the Helm chart (version comes from helm/Chart.yaml, not the git tag).
  - id: push-helm-chart
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    waitFor: ["-"]
    args:
      - -c
      - |
        set -e
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm registry login -u oauth2accesstoken -p "$(gcloud auth print-access-token)" "${_REGION}-docker.pkg.dev"
        mkdir -p dist
        helm package helm -d dist
        VERSION="$(helm show chart helm | awk '/^version:/ {print $$2}')"
        helm push "dist/octo-$${VERSION}.tgz" "oci://${_IMAGE_BASE}"

  # Roll the cluster: apply the Terraform release root (Helm provider). Gated on
  # _DEPLOY so a build can publish without deploying. Runs after the images AND the
  # chart are in the registry. terraform is installed here the same way helm is above;
  # gcloud (this image) covers the SSH octo-pull, the GCS backend, and the google data
  # sources in release/.
  - id: deploy
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    waitFor: ["push-images", "push-helm-chart"]
    args:
      - -c
      - |
        set -e
        if [ "${_DEPLOY}" != "true" ]; then
          echo "deploy disabled (_DEPLOY=${_DEPLOY}); build + push only"
          exit 0
        fi
        TF_VERSION=1.9.8
        curl -fsSL "https://releases.hashicorp.com/terraform/$${TF_VERSION}/terraform_$${TF_VERSION}_linux_amd64.zip" -o /tmp/tf.zip
        # The gcloud image has no `unzip`, but it ships python3; extract with stdlib.
        python3 -c "import zipfile; zipfile.ZipFile('/tmp/tf.zip').extractall('/usr/local/bin')"
        chmod +x /usr/local/bin/terraform
        # Fetch the cluster kubeconfig over IAP (server rewritten to the public API
        # endpoint, which the k3s cert covers via --tls-san). SSH as a NON-root user:
        # the build's gcloud container runs as root, so an unqualified `compute ssh`
        # connects as root — which GCE rejects ("Permission denied (publickey)")
        # because the guest agent only provisions metadata SSH keys for non-root
        # users (and grants them passwordless sudo via google-sudoers).
        #
        # `sed -n '/^apiVersion:/,$$p'` drops any leading gcloud/IAP chatter (e.g. the
        # "install NumPy" tunnel WARNING, which can land on stdout in the build env)
        # so only the real kubeconfig YAML is written — otherwise Helm fails parsing
        # it ("mapping values are not allowed in this context"). Retried because the
        # first SSH after the key is pushed fails until it propagates; pipefail + the
        # apiVersion guard keep a chatter-only/half-written file from counting as success.
        set -o pipefail
        for i in 1 2 3 4 5; do
          if gcloud compute ssh "octodeploy@${_INSTANCE}" --zone "${_ZONE}" --tunnel-through-iap --quiet \
               --command 'sudo cat /etc/rancher/k3s/k3s.yaml' \
               | sed -n '/^apiVersion:/,$$p' \
               | sed "s#https://127.0.0.1:6443#https://${_DOMAIN}:6443#" > /workspace/kubeconfig.yaml \
             && head -1 /workspace/kubeconfig.yaml | grep -q '^apiVersion:'; then
            break
          fi
          echo "kubeconfig SSH attempt $$i failed; retrying in 15s" >&2
          sleep 15
        done
        # Hard-fail the build if every attempt produced no valid kubeconfig.
        head -1 /workspace/kubeconfig.yaml | grep -q '^apiVersion:'
        # octo.tfvars is gitignored, so it is absent in the build checkout. Pass the
        # config via -var from substitutions ($PROJECT_ID is a Cloud Build built-in);
        # repository_id/namespace/wildcard_tls/cluster_issuer use their (correct)
        # defaults and OIDC is read back from oidc.json in the state bucket.
        CHART_VERSION="$(awk '/^version:/ {print $$2}' helm/Chart.yaml)"
        terraform -chdir=deploy/terraform/release init -input=false
        terraform -chdir=deploy/terraform/release apply -auto-approve -input=false \
          -var project_id="$PROJECT_ID" \
          -var region="${_REGION}" \
          -var domain="${_DOMAIN}" \
          -var instance_name="${_INSTANCE}" \
          -var zone="${_ZONE}" \
          -var image_tag="${_TAG}" \
          -var chart_version="$${CHART_VERSION}" \
          -var kubeconfig=/workspace/kubeconfig.yaml
