service:
  name: http-orders

# This sample shows the flow-ref block in action. The HTTP-triggered flow
# delegates to two sourceless flows (flows with no `source:` get an implicit
# source and become callable by name):
#   * audit        — invoked ONE-WAY (oneWay: true): fire-and-forget, the caller
#                    does not wait for it and ignores its result.
#   * enrich-order — invoked SYNC (the default): the caller waits and the called
#                    flow's body + variables are folded back into the message.
#
# Try it:
#   go run ./cli -config samples/http-orders.yaml
#   curl -s -X POST localhost:8080/api/v1/orders/42 \
#     -H 'X-Tenant: acme' -H 'X-Request-Id: req-1' \
#     -d '{"item":"widget","amount":1500}'

# Environment variables must be declared here before they can be referenced as
# ${NAME} in any settings value below. Each resolves as
# OS environment > .env file (./.env or $EIP_ENV_FILE) > the default declared here.
# Override at startup without editing this file, e.g.:
#   HTTP_PORT=9090 go run ./cli -config samples/http-orders.yaml
# or put the same line in a ./.env file (it hot-reloads with --watch).
env:
  - name: HTTP_HOST
    default: 0.0.0.0
  - name: HTTP_PORT
    default: "8080"
  - name: HTTP_BASE_PATH
    default: /api/v1

connectors:
  - name: api
    type: http
    settings:
      host: ${HTTP_HOST}
      port: ${HTTP_PORT}        # an exact ${VAR} keeps its type -> int 8080
      basePath: ${HTTP_BASE_PATH}
      keepAlive: true
      requestTimeout: 5s        # how long a handler waits for the flow to finish
      readTimeout: 10s
      writeTimeout: 10s
      idleTimeout: 60s
  - name: debug
    type: logger
    settings:
      format: json              # structured output, clean for full message dumps
      level: debug

flows:
  - name: orders-api
    workers: 8
    buffer: 128
    source:
      connector: api
      type: http
      settings:
        path: /orders/{id}            # {id} -> vars.id
        correlationIdHeader: X-Request-Id
        headers: [X-Tenant]           # captured as vars["X-Tenant"]
        timeout: 5s
        maxBodyBytes: 1048576         # 1 MiB, via http.MaxBytesReader
    process:
      # --- Inbound dump: log the whole message exactly as it arrives ---
      - type: log
        name: dump-inbound
        settings:
          logger: debug
          level: debug
          full: true            # event id, correlation id, variables, body

      # --- Query parameters: vars.query is always a (possibly empty) map ---
      - type: set-variable
        name: resolve-currency
        settings:
          name: currency
          value: 'has(vars.query.currency) ? vars.query.currency : "USD"'

      # --- ONE-WAY flow-ref: fire-and-forget audit. We do not wait for `audit`
      #     and its result is ignored; the request keeps moving immediately. ---
      - type: flow-ref
        name: audit-async
        settings:
          flow: audit
          oneWay: true

      # --- Content-based routing on the HTTP method ---
      - type: switch
        name: route-by-method
        cases:
          # POST: delegate normalization to the `enrich-order` flow SYNCHRONOUSLY.
          # The called flow runs, and its resulting body + variables are folded
          # back into this message before we continue.
          - when: 'vars.method == "POST"'
            process:
              - type: flow-ref
                name: enrich-sync
                settings:
                  flow: enrich-order   # oneWay defaults to false -> wait for result

          # A GET reflects the path + resolved query back (a stub lookup).
          - when: 'vars.method == "GET"'
            process:
              - type: set-payload
                name: lookup-order
                settings:
                  value: '{"orderId": vars.id, "currency": vars.currency, "status": "found"}'
        default:
          process:
            - type: set-payload
              name: method-not-supported
              settings:
                value: '{"error": "method " + vars.method + " not supported"}'

      # Wire tap: the final body is what gets written back to the caller as JSON 200.
      - type: log
        settings:
          message: '"responding to " + vars.method + " /orders/" + vars.id'

  # --- Sourceless flow, invoked ONE-WAY for its side effect (an audit log). ---
  - name: audit
    process:
      - type: log
        name: audit-log
        settings:
          logger: debug
          level: info
          message: '"AUDIT " + vars.method + " order " + vars.id + " req=" + correlationID'

  # --- Sourceless flow, invoked SYNCHRONOUSLY. It receives a clone of the
  #     caller's message (body + variables), normalizes the order, flags priority,
  #     and returns the wrapped response. The caller folds this result back in. ---
  - name: enrich-order
    process:
      - type: set-payload
        name: normalize-order
        settings:
          value: >
            {
              "orderId":   vars.id,
              "tenant":    vars["X-Tenant"],
              "item":      body.item,
              "amount":    body.amount,
              "currency":  vars.currency,
              "requestId": correlationID
            }
      # Conditional transform: flag high-value orders.
      - type: if
        name: priority-check
        condition: 'body.amount >= 1000.0'
        then:
          process:
            - type: set-variable
              settings: { name: priority, value: '"high"' }
        else:
          process:
            - type: set-variable
              settings: { name: priority, value: '"normal"' }
      - type: set-payload
        name: wrap-response
        settings:
          value: '{"order": body, "priority": vars.priority, "status": "accepted"}'
