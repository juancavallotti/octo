version: '3'

# Module taskfiles live next to the code they drive and are imported here.
# Their tasks are available under a namespace, e.g. `task runtime:test`,
# `task editor:dev`. The thin aggregators below preserve the short top-level
# targets (`task lint`, `task test`, ...) used by CI and day-to-day work.
includes:
  runtime:
    taskfile: ./runtime/Taskfile.yml
    dir: ./runtime
  editor:
    taskfile: ./editor/Taskfile.yml
    dir: ./editor
  orchestrator:
    taskfile: ./orchestrator/Taskfile.yml
    dir: ./orchestrator

# Global env reaches every task, including those in included taskfiles (task-level
# env does not propagate to called tasks). The editor reads these server-side to
# enable its dev RUN feature: OCTO_BIN_PATH is the runner spawned on RUN, and
# OCTO_RUN_DIR is where the rendered config is written for `octo -watch`. Running
# the editor directly inside the module (bypassing this root Taskfile) leaves them
# unset, which simply disables RUN.
env:
  OCTO_BIN_PATH: '{{.ROOT_DIR}}/bin/octo'
  OCTO_RUN_DIR: '{{.ROOT_DIR}}/.octo-run'

# The kube context k3d creates for our cluster. Every cluster:* task pins to it
# explicitly so a stray current-context (e.g. a remote EKS cluster) can never be
# the target of a deploy/purge/dev command.
vars:
  KCTX: k3d-octo

tasks:
  fmt:
    desc: Format all Go modules
    cmds:
      - task: runtime:fmt
      - task: orchestrator:fmt

  test:
    desc: Run tests across all modules (runtime + editor + orchestrator)
    cmds:
      - task: runtime:test
      - task: editor:test
      - task: orchestrator:test

  build:
    desc: Build all modules (CLI binary + editor + orchestrator)
    cmds:
      - task: runtime:build
      - task: editor:build
      - task: orchestrator:build

  dev:
    desc: Build the runner, then run the editor dev server (RUN button enabled)
    cmds:
      - task: runtime:build
      - task: editor:dev

  tidy:
    desc: Tidy all Go modules
    cmds:
      - task: runtime:tidy
      - task: orchestrator:tidy

  lint:
    desc: Lint all modules (runtime + editor + orchestrator)
    cmds:
      - task: runtime:lint
      - task: editor:lint
      - task: orchestrator:lint

  run:
    desc: Run the CLI with a config file
    cmds:
      - task: runtime:run

  run:sample:
    desc: 'Run a config from samples/ (e.g. task run:sample -- heartbeat.yaml)'
    cmds:
      - task: runtime:run:sample

  new-connector:
    desc: Interactively scaffold a new connector
    interactive: true
    cmds:
      - ./scripts/new-connector.sh {{.CLI_ARGS}}

  lint-strict:
    desc: Verify lint configuration is present
    cmds:
      - test -f runtime/.golangci.yml
      - test -f docs/linting-policy.md

  policy-check:
    desc: Verify governance files exist
    cmds:
      - test -f AGENTS.md
      - test -f docs/coding-standards.md
      - test -f docs/linting-policy.md
      - test -f docs/commit-and-review-policy.md
      - test -f docs/release-process.md
      - test -f runtime/go.work

  release-check:
    desc: Verify release readiness files exist
    cmds:
      - task: policy-check
      - test -f .github/workflows/release.yml
      - test -f .github/workflows/release-please.yml
      - test -f release-please-config.json
      - test -f .release-please-manifest.json
      - test -f README.md

  cluster:preflight:
    desc: Verify docker, k3d and devspace are installed
    silent: true
    cmds:
      - |
        missing=
        for tool in docker k3d devspace; do
          command -v "$tool" >/dev/null 2>&1 || missing="$missing $tool"
        done
        if [ -n "$missing" ]; then
          echo "✖ missing required tools:$missing" >&2
          echo "  install hints:" >&2
          echo "    docker   — Docker Desktop (https://www.docker.com)" >&2
          echo "    k3d      — https://k3d.io  (brew install k3d)" >&2
          echo "    devspace — https://devspace.sh  (brew install devspace)" >&2
          exit 1
        fi
        echo "✓ docker, k3d, devspace present"

  cluster:images:
    desc: Build the editor/orchestrator/schema images and load them into the k3d 'octo' cluster
    cmds:
      # Editor build context is the repo ROOT so its Dockerfile can reach both
      # runtime/ (to build octo) and editor/ (the Next.js app).
      - docker build -t octo-editor:dev -f editor/Dockerfile .
      - docker build -t octo-orchestrator:dev -f orchestrator/Dockerfile ./orchestrator
      - docker build -t octo-schema:dev -f sql/Dockerfile ./sql
      # Load the images straight into the cluster's containerd (no registry needed).
      - k3d image import octo-editor:dev octo-orchestrator:dev octo-schema:dev -c octo

  cluster:images:dev:
    desc: Build + load the dev (hot-reload) images into the k3d 'octo' cluster
    cmds:
      - docker build -t octo-editor-dev:dev -f editor/Dockerfile.dev .
      - docker build -t octo-orchestrator-dev:dev -f orchestrator/Dockerfile.dev ./orchestrator
      - k3d image import octo-editor-dev:dev octo-orchestrator-dev:dev -c octo

  cluster:dev:
    desc: Bring up the cluster, then run DevSpace dev mode (hot reload + tailed logs)
    cmds:
      # Ensure the cluster + Postgres + schema are up (idempotent), then load the
      # dev images and hand off to `devspace dev`, which swaps the app pods for
      # their dev images, syncs source for hot reload, and tails logs. Stays
      # attached until Ctrl-C; `devspace reset pods -n octo-dev` restores prod pods.
      - task: cluster:deploy
      - task: cluster:images:dev
      - devspace dev --kube-context {{.KCTX}} --namespace octo-dev

  cluster:deploy:
    desc: Spin up the local k3d (k3s) cluster and deploy editor, Postgres, orchestrator
    cmds:
      - task: cluster:preflight
      - |
        if k3d cluster list 2>/dev/null | grep -qw octo; then
          echo "✓ k3d cluster 'octo' already exists"
        else
          echo "▶ creating k3d cluster 'octo' (Postgres data -> ./data)..."
          mkdir -p data
          k3d cluster create --config deploy/k3d/cluster.yaml \
            --volume "$(pwd)/data:/var/lib/octo-data@server:0"
        fi
      # Build + load images, then apply deploy/k8s/ via DevSpace.
      - task: cluster:images
      - devspace deploy --kube-context {{.KCTX}} --namespace octo-dev
      # Fixed :dev tags don't change between runs, so nudge the apps to pull the
      # freshly imported images. Harmless on first run; ignored if not yet present.
      - kubectl --context {{.KCTX}} rollout restart deployment editor orchestrator -n octo-dev 2>/dev/null || true
      - |
        echo ""
        echo "✓ cluster up:"
        echo "    editor        http://localhost:3000"
        echo "    orchestrator  http://localhost:8090/healthz  (and /db-version)"
        echo "  pods: kubectl get pods -n octo-dev"

  cluster:stop:
    desc: Tear down the local k3d cluster and free resources (keeps ./data)
    cmds:
      - devspace purge --kube-context {{.KCTX}} --namespace octo-dev || true
      - |
        if k3d cluster list 2>/dev/null | grep -qw octo; then
          k3d cluster delete octo
          echo "✓ k3d cluster 'octo' deleted; Docker memory reclaimed"
        else
          echo "✓ no k3d cluster 'octo' to delete"
        fi
      - echo "ℹ Postgres data preserved in ./data — delete it manually to reset the DB"
