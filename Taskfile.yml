version: '3'

vars:
  GO: go

tasks:
  fmt:
    desc: Format all Go modules
    cmds:
      - cd runtime/types && {{.GO}} fmt ./...
      - cd runtime/core && {{.GO}} fmt ./...
      - cd runtime/connectors && {{.GO}} fmt ./...
      - cd runtime/cli && {{.GO}} fmt ./...

  test:
    desc: Run tests across all modules
    cmds:
      - cd runtime/types && {{.GO}} test ./...
      - cd runtime/core && {{.GO}} test ./...
      - cd runtime/connectors && {{.GO}} test ./...
      - cd runtime/cli && {{.GO}} test ./...

  build:
    desc: Build the CLI binary
    cmds:
      - mkdir -p bin
      - cd runtime/cli && {{.GO}} build -o ../../bin/eip-go .

  tidy:
    desc: Tidy all modules
    cmds:
      - cd runtime/types && {{.GO}} mod tidy
      - cd runtime/core && {{.GO}} mod tidy
      - cd runtime/connectors && {{.GO}} mod tidy
      - cd runtime/cli && {{.GO}} mod tidy

  lint:
    desc: Run golangci-lint across all modules
    cmds:
      - cd runtime/types && golangci-lint run ./...
      - cd runtime/core && golangci-lint run ./...
      - cd runtime/connectors && golangci-lint run ./...
      - cd runtime/cli && golangci-lint run ./...

  lint-strict:
    desc: Verify lint configuration is present
    cmds:
      - test -f runtime/.golangci.yml
      - test -f docs/linting-policy.md

  policy-check:
    desc: Verify governance files exist
    cmds:
      - test -f AGENTS.md
      - test -f docs/coding-standards.md
      - test -f docs/linting-policy.md
      - test -f docs/commit-and-review-policy.md
      - test -f docs/release-process.md
      - test -f runtime/go.work

  release-check:
    desc: Verify release readiness files exist
    cmds:
      - task: policy-check
      - test -f .github/workflows/release.yml
      - test -f .github/workflows/release-please.yml
      - test -f release-please-config.json
      - test -f .release-please-manifest.json
      - test -f README.md

  run:
    desc: Run the CLI with a config file
    cmds:
      - cd runtime/cli && {{.GO}} run . {{.CLI_ARGS}}

  run:sample:
    desc: 'Run a config from samples/ (e.g. task run:sample -- heartbeat.yaml)'
    cmds:
      - cd runtime/cli && {{.GO}} run . -config ../../samples/{{.CLI_ARGS}}

  new-connector:
    desc: Interactively scaffold a new connector
    interactive: true
    cmds:
      - ./scripts/new-connector.sh {{.CLI_ARGS}}
