version: '3'

# Module taskfiles live next to the code they drive and are imported here.
# Their tasks are available under a namespace, e.g. `task runtime:test`,
# `task editor:dev`. The thin aggregators below preserve the short top-level
# targets (`task lint`, `task test`, ...) used by CI and day-to-day work.
includes:
  runtime:
    taskfile: ./runtime/Taskfile.yml
    dir: ./runtime
  editor:
    taskfile: ./editor/Taskfile.yml
    dir: ./editor
  orchestrator:
    taskfile: ./orchestrator/Taskfile.yml
    dir: ./orchestrator

# Global env reaches every task, including those in included taskfiles (task-level
# env does not propagate to called tasks). The editor reads these server-side to
# enable its dev RUN feature: OCTO_BIN_PATH is the runner spawned on RUN, and
# OCTO_RUN_DIR is where the rendered config is written for `octo -watch`. Running
# the editor directly inside the module (bypassing this root Taskfile) leaves them
# unset, which simply disables RUN.
env:
  OCTO_BIN_PATH: '{{.ROOT_DIR}}/bin/octo'
  OCTO_RUN_DIR: '{{.ROOT_DIR}}/.octo-run'

# The kube context k3d creates for our cluster. Every cluster:* task pins to it
# explicitly so a stray current-context (e.g. a remote EKS cluster) can never be
# the target of a deploy/purge/dev command.
vars:
  KCTX: k3d-octo

tasks:
  fmt:
    desc: Format all Go modules
    cmds:
      - task: runtime:fmt
      - task: orchestrator:fmt

  test:
    desc: Run tests across all modules (runtime + editor + orchestrator)
    cmds:
      - task: runtime:test
      - task: editor:test
      - task: orchestrator:test

  build:
    desc: Build all modules (CLI binary + editor + orchestrator)
    cmds:
      - task: runtime:build
      - task: editor:build
      - task: orchestrator:build

  dev:
    desc: Build the runner, then run the editor dev server (RUN button enabled)
    cmds:
      - task: runtime:build
      - task: editor:dev

  tidy:
    desc: Tidy all Go modules
    cmds:
      - task: runtime:tidy
      - task: orchestrator:tidy

  lint:
    desc: Lint all modules (runtime + editor + orchestrator)
    cmds:
      - task: runtime:lint
      - task: editor:lint
      - task: orchestrator:lint

  run:
    desc: Run the CLI with a config file
    cmds:
      - task: runtime:run

  run:sample:
    desc: 'Run a config from samples/ (e.g. task run:sample -- heartbeat.yaml)'
    cmds:
      - task: runtime:run:sample

  new-connector:
    desc: Interactively scaffold a new connector
    interactive: true
    cmds:
      - ./scripts/new-connector.sh {{.CLI_ARGS}}

  lint-strict:
    desc: Verify lint configuration is present
    cmds:
      - test -f runtime/.golangci.yml
      - test -f docs/linting-policy.md

  policy-check:
    desc: Verify governance files exist
    cmds:
      - test -f AGENTS.md
      - test -f docs/coding-standards.md
      - test -f docs/linting-policy.md
      - test -f docs/commit-and-review-policy.md
      - test -f docs/release-process.md
      - test -f runtime/go.work

  release-check:
    desc: Verify release readiness files exist
    cmds:
      - task: policy-check
      - test -f .github/workflows/release.yml
      - test -f .github/workflows/release-please.yml
      - test -f release-please-config.json
      - test -f .release-please-manifest.json
      - test -f README.md

  cluster:preflight:
    desc: Verify docker, k3d and devspace are installed
    silent: true
    cmds:
      - |
        missing=
        for tool in docker k3d devspace; do
          command -v "$tool" >/dev/null 2>&1 || missing="$missing $tool"
        done
        if [ -n "$missing" ]; then
          echo "✖ missing required tools:$missing" >&2
          echo "  install hints:" >&2
          echo "    docker   — Docker Desktop (https://www.docker.com)" >&2
          echo "    k3d      — https://k3d.io  (brew install k3d)" >&2
          echo "    devspace — https://devspace.sh  (brew install devspace)" >&2
          exit 1
        fi
        echo "✓ docker, k3d, devspace present"

  cluster:images:
    desc: Build the editor/orchestrator/schema/runtime images and load them into the k3d 'octo' cluster
    cmds:
      # Editor build context is the repo ROOT so its Dockerfile can reach both
      # runtime/ (to build octo) and editor/ (the Next.js app).
      - docker build -t octo-editor:dev -f editor/Dockerfile .
      - docker build -t octo-orchestrator:dev -f orchestrator/Dockerfile ./orchestrator
      - docker build -t octo-schema:dev -f sql/Dockerfile ./sql
      # Generic runtime image the orchestrator deploys per integration (build
      # context is the runtime workspace).
      - docker build -t octo-runtime:dev -f runtime/Dockerfile ./runtime
      # Load the images straight into the cluster's containerd (no registry needed).
      - k3d image import octo-editor:dev octo-orchestrator:dev octo-schema:dev octo-runtime:dev -c octo

  cluster:images:dev:
    desc: Build + load the dev (hot-reload) images into the k3d 'octo' cluster
    cmds:
      - docker build -t octo-editor-dev:dev -f editor/Dockerfile.dev .
      - docker build -t octo-orchestrator-dev:dev -f orchestrator/Dockerfile.dev ./orchestrator
      - k3d image import octo-editor-dev:dev octo-orchestrator-dev:dev -c octo

  cluster:dev:
    desc: Bring up the cluster, then run DevSpace dev mode (hot reload + tailed logs)
    cmds:
      # Ensure the cluster + Postgres + schema are up (idempotent), then load the
      # dev images and hand off to `devspace dev`, which swaps the app pods for
      # their dev images, syncs source for hot reload, and tails logs. Stays
      # attached until Ctrl-C; `devspace reset pods -n octo-dev` restores prod pods.
      - task: cluster:deploy
      - task: cluster:images:dev
      - devspace dev --kube-context {{.KCTX}} --namespace octo-dev

  cluster:deploy:
    desc: Spin up the local k3d (k3s) cluster and deploy editor, Postgres, orchestrator
    cmds:
      - task: cluster:preflight
      - |
        if k3d cluster list 2>/dev/null | grep -qw octo; then
          echo "✓ k3d cluster 'octo' already exists"
        else
          echo "▶ creating k3d cluster 'octo' (Postgres data -> ./data)..."
          mkdir -p data
          k3d cluster create --config deploy/k3d/cluster.yaml \
            --volume "$(pwd)/data:/var/lib/octo-data@server:0"
        fi
      # Build + load images, then apply deploy/k8s/ via DevSpace.
      - task: cluster:images
      - devspace deploy --kube-context {{.KCTX}} --namespace octo-dev
      # Fixed :dev tags don't change between runs, so nudge the apps to pull the
      # freshly imported images. Harmless on first run; ignored if not yet present.
      - kubectl --context {{.KCTX}} rollout restart deployment editor orchestrator -n octo-dev 2>/dev/null || true
      - |
        echo ""
        echo "✓ cluster up:"
        echo "    editor        http://localhost:3000"
        echo "    orchestrator  http://localhost:8090/healthz  (and /db-version)"
        echo "  pods: kubectl get pods -n octo-dev"

  cluster:stop:
    desc: Tear down the local k3d cluster and free resources (keeps ./data)
    cmds:
      - devspace purge --kube-context {{.KCTX}} --namespace octo-dev || true
      - |
        if k3d cluster list 2>/dev/null | grep -qw octo; then
          k3d cluster delete octo
          echo "✓ k3d cluster 'octo' deleted; Docker memory reclaimed"
        else
          echo "✓ no k3d cluster 'octo' to delete"
        fi
      - echo "ℹ Postgres data preserved in ./data — run 'task cluster:db:reset' to wipe it"

  cluster:db:reset:
    desc: Delete the local Postgres data dir (./data) so the DB is recreated fresh on next deploy
    prompt: This permanently deletes ./data and all local Postgres data. Continue?
    cmds:
      # Postgres holds the data dir open while the cluster runs; deleting it then
      # would corrupt the volume. Require the cluster down first.
      - |
        if k3d cluster list 2>/dev/null | grep -qw octo; then
          echo "✖ k3d cluster 'octo' is running; stop it first so Postgres releases ./data:" >&2
          echo "    task cluster:stop" >&2
          exit 1
        fi
      - rm -rf data
      - echo "✓ ./data removed; 'task cluster:deploy' will recreate Postgres and re-apply the schema fresh"

  # --- Publishing to Artifact Registry (for the GCP/k3s deployment) ---
  # IMAGE_BASE is the repository path output by deploy/terraform/infra (image_base),
  # e.g. us-central1-docker.pkg.dev/PROJECT/octo. The four images live under it
  # (IMAGE_BASE/octo-editor:TAG ...) and the OCI chart under IMAGE_BASE/octo.

  images:push:
    desc: 'Build the four octo images and push them to Artifact Registry (set IMAGE_BASE and TAG; run `gcloud auth configure-docker <region>-docker.pkg.dev` first)'
    requires:
      vars: [IMAGE_BASE, TAG]
    cmds:
      # Same build contexts as cluster:images; the editor context is the repo root
      # so its Dockerfile reaches both runtime/ and editor/.
      - docker build -t {{.IMAGE_BASE}}/octo-editor:{{.TAG}} -f editor/Dockerfile .
      - docker build -t {{.IMAGE_BASE}}/octo-orchestrator:{{.TAG}} -f orchestrator/Dockerfile ./orchestrator
      - docker build -t {{.IMAGE_BASE}}/octo-schema:{{.TAG}} -f sql/Dockerfile ./sql
      - docker build -t {{.IMAGE_BASE}}/octo-runtime:{{.TAG}} -f runtime/Dockerfile ./runtime
      - docker push {{.IMAGE_BASE}}/octo-editor:{{.TAG}}
      - docker push {{.IMAGE_BASE}}/octo-orchestrator:{{.TAG}}
      - docker push {{.IMAGE_BASE}}/octo-schema:{{.TAG}}
      - docker push {{.IMAGE_BASE}}/octo-runtime:{{.TAG}}

  helm:lint:
    desc: Lint the octo Helm chart
    cmds:
      - helm lint helm

  helm:package:
    desc: Lint and package the chart into dist/ (octo-<version>.tgz)
    cmds:
      - mkdir -p dist
      - helm lint helm
      - helm package helm -d dist

  helm:push:
    desc: 'Package and push the chart to Artifact Registry OCI (set IMAGE_BASE; run `helm registry login <region>-docker.pkg.dev` first)'
    requires:
      vars: [IMAGE_BASE]
    cmds:
      - task: helm:package
      - |
        set -e
        VERSION="$(helm show chart helm | awk '/^version:/ {print $2}')"
        helm push "dist/octo-${VERSION}.tgz" "oci://{{.IMAGE_BASE}}"

  deploy:kubeconfig:
    desc: 'Fetch the k3s kubeconfig from the VM for the Terraform release root (set DOMAIN; optional INSTANCE, ZONE)'
    requires:
      vars: [DOMAIN]
    vars:
      INSTANCE: '{{.INSTANCE | default "octo"}}'
      ZONE: '{{.ZONE | default "us-west1-a"}}'
      OUT: '{{.OUT | default "deploy/terraform/infra/kubeconfig.yaml"}}'
    cmds:
      # k3s writes the kubeconfig with server https://127.0.0.1:6443; rewrite it to
      # the public domain (covered by the API cert via --tls-san) so the Terraform
      # Helm provider can reach the cluster. The file is gitignored (cluster admin).
      - |
        set -e
        gcloud compute ssh {{.INSTANCE}} --zone {{.ZONE}} --tunnel-through-iap --quiet --command 'sudo cat /etc/rancher/k3s/k3s.yaml' \
          | sed "s#https://127.0.0.1:6443#https://{{.DOMAIN}}:6443#" > {{.OUT}}
        echo "✓ wrote {{.OUT}} (server https://{{.DOMAIN}}:6443)"

  deploy:
    desc: 'Deploy/upgrade the octo release on the cluster from an already-published tag (set TAG; optional DOMAIN, INSTANCE, ZONE). Same path Cloud Build runs on a version tag.'
    requires:
      vars: [TAG]
    vars:
      DOMAIN: '{{.DOMAIN | default "octo.juancavallotti.com"}}'
      INSTANCE: '{{.INSTANCE | default "octo"}}'
      ZONE: '{{.ZONE | default "us-west1-a"}}'
    cmds:
      # Fetch a fresh kubeconfig (-> deploy/terraform/infra/kubeconfig.yaml), then
      # apply the release root with the chart version derived from helm/Chart.yaml.
      - task: deploy:kubeconfig
        vars: { DOMAIN: '{{.DOMAIN}}', INSTANCE: '{{.INSTANCE}}', ZONE: '{{.ZONE}}' }
      - |
        set -e
        CHART_VERSION="$(helm show chart helm | awk '/^version:/ {print $2}')"
        terraform -chdir=deploy/terraform/release init -input=false
        terraform -chdir=deploy/terraform/release apply -auto-approve -compact-warnings \
          -var-file=../octo.tfvars \
          -var image_tag={{.TAG}} \
          -var chart_version="${CHART_VERSION}"

  state:bucket:
    desc: 'Create the GCS bucket backing the release Terraform state (run once; set PROJECT, optional REGION). Must match release/backend.tf (octo-tfstate-PROJECT).'
    requires:
      vars: [PROJECT]
    vars:
      REGION: '{{.REGION | default "us-west1"}}'
    cmds:
      - |
        set -e
        BUCKET="gs://octo-tfstate-{{.PROJECT}}"
        gcloud storage buckets create "$BUCKET" --location={{.REGION}} --uniform-bucket-level-access
        gcloud storage buckets update "$BUCKET" --versioning
        echo "✓ created $BUCKET (versioned). Set it as the bucket in release/backend.tf if PROJECT != juancavallotti."

  infra:apply:
    desc: 'Apply the one-time infra root (registry + VM/k3s + optional Cloud Build) from octo.tfvars'
    cmds:
      - terraform -chdir=deploy/terraform/infra init -input=false
      - terraform -chdir=deploy/terraform/infra apply -compact-warnings -var-file=../octo.tfvars
