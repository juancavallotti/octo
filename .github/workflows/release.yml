name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: runtime/go.work
      - run: task release-check
      - run: task build
