name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: runtime/go.work
      - run: task policy-check
      - run: task tidy
      - run: task fmt
      - run: task test
      - run: task build
