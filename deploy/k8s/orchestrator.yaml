# The orchestrator API (octo-orchestrator image). Listens on 8090 and reads
# site_settings from Postgres via DATABASE_URL.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: octo-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      # Bound to the orchestrator Role (deploy/k8s/orchestrator-rbac.yaml) so the
      # service can create/inspect/delete integration workloads in this namespace.
      serviceAccountName: orchestrator
      containers:
        - name: orchestrator
          # Built by `task cluster:images` and loaded via `k3d image import`.
          image: octo-orchestrator:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: PORT
              value: "8090"
            - name: DATABASE_URL
              value: postgres://octo:octo@postgres:5432/octo?sslmode=disable
            # Namespace and image used when deploying integration pods.
            - name: KUBE_NAMESPACE
              value: octo-dev
            - name: RUNTIME_IMAGE
              value: octo-runtime:dev
            # Runtime-services env injected into each deployed runtime pod so its k8s
            # services module can reach Lease-based leader election + the KV API.
            # ORCHESTRATOR_URL being set is what enables the injection; it points at
            # this orchestrator's in-cluster Service.
            - name: RUNTIME_SERVICES_MODULE
              value: k8s
            - name: ORCHESTRATOR_URL
              value: http://orchestrator.octo-dev:8090
            - name: RUNTIME_SERVICE_ACCOUNT
              value: octo-runtime
            # Dev-only throwaway AES-256 key (base64) so KV secret namespaces work
            # locally. The platform generates a real key via Terraform; never reuse
            # this one outside the local k3d cluster.
            - name: KV_ENCRYPTION_KEY
              value: RwbauJ1U7IvkOl8IZsNCQNShHGA/sqP+TQymYAkOFQ8=
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: octo-dev
spec:
  # NodePort so the k3d loadbalancer mapping (localhost:8090 -> 30090) reaches it.
  type: NodePort
  selector:
    app: orchestrator
  ports:
    - name: http
      port: 8090
      targetPort: 8090
      nodePort: 30090
