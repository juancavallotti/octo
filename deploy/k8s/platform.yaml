# The bundled platform app + runtime (octo-platform image). The Next.js server runs
# on 3000 and spawns the bundled octo binary via OCTO_BIN_PATH for the RUN feature.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform
  namespace: octo-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform
  template:
    metadata:
      labels:
        app: platform
    spec:
      containers:
        - name: platform
          # Built by `task cluster:images` and loaded via `k3d image import`.
          image: octo-platform:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            # Match the image defaults; OCTO_RUN_DIR is backed by the writable
            # emptyDir below so the editor can write rendered configs at runtime.
            - name: OCTO_BIN_PATH
              value: /usr/local/bin/octo
            - name: OCTO_RUN_DIR
              value: /app/.octo-run
            # Enables the integration/folder management UI; the editor's BFF
            # proxy routes front the orchestrator (in-cluster service DNS).
            - name: ORCHESTRATOR_URL
              value: http://orchestrator.octo-dev:8090
            # Canonical base URL Auth.js builds sign-in redirects / OAuth callbacks
            # against. Without it, trustHost infers the host from request headers,
            # which behind the k3d loadbalancer/NodePort is 0.0.0.0:3000 — sending
            # sign-in to the wrong origin. Harmless when SSO is off; the URL must
            # match how you reach the cluster (k3d maps localhost:3000 -> :30030).
            # (The GCP deploy sets this from the ingress host via the Helm chart.)
            - name: AUTH_URL
              value: http://localhost:3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: octo-run
              mountPath: /app/.octo-run
      volumes:
        - name: octo-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: platform
  namespace: octo-dev
spec:
  # NodePort so the k3d loadbalancer mapping (localhost:3000 -> 30030) reaches it.
  type: NodePort
  selector:
    app: platform
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30030
